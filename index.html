    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Space Grotesk', 'sans-serif'], body: ['DM Sans', 'sans-serif'] },
                    colors: {
                        bg: 'var(--bg)', fg: 'var(--fg)', muted: 'var(--muted)',
                        accent: 'var(--accent)', card: 'var(--card)', border: 'var(--border)', surface: 'var(--surface)',
                    }

    <style>
        :root { --bg: #0a0a0b; --fg: #fafafa; --muted: #71717a; --accent: #f59e0b; --card: #18181b; --border: #27272a; --surface: #0f0f10; }
        [data-theme="light"] { --bg: #fafaf9; --fg: #0a0a0b; --muted: #71717a; --accent: #d97706; --card: #ffffff; --border: #e5e5e5; --surface: #f5f5f4; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--fg); transition: background-color 0.3s ease, color 0.3s ease; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }

        .btn-primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #0a0a0b; font-weight: 600; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(245, 158, 11, 0.5); }
        .btn-ghost { background: transparent; color: var(--fg); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        
        .input-field { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; color: var(--fg); transition: all 0.2s; }
        .input-field:focus { outline: none; border-color: var(--accent); }

        /* Sidebar Logic */
        .sidebar { 
            width: 260px; 
            height: 100vh; 
            background: var(--card); 
            border-right: 1px solid var(--border); 
            position: fixed; left: 0; top: 0; padding: 24px; 
            display: flex; flex-direction: column; z-index: 40; 
            transition: transform 0.3s ease;
        }
        .main-dashboard { margin-left: 260px; min-height: 100vh; background: var(--bg); }
        
        /* Mobile Responsive Logic */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
            .main-dashboard { margin-left: 0; }
            .mobile-menu-btn { display: flex !important; }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn { display: none; }
        }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background-color: #25D366; color: white;
            width: 60px; height: 60px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.3); z-index: 100;
            transition: transform 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        .whatsapp-tooltip {
            position: absolute; right: 70px; background: var(--card);
            border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px;
            font-size: 14px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .whatsapp-float:hover .whatsapp-tooltip { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        .toggle-switch { position: relative; width: 44px; height: 24px; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.active { background: var(--accent); }
        .toggle-switch::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.3s; }
        .toggle-switch.active::after { transform: translateX(20px); }
    </style>
</head>
<body>

        <svg style="width: 32px; height: 32px; fill: white;" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

    <div id="app-shell">
        <!-- Top Navigation -->
        <nav id="top-nav" class="fixed top-0 left-0 right-0 z-50 bg-bg/80 backdrop-blur-lg border-b border-border">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">

        <main id="main-view" class="pt-16"></main>

    <!-- Modals -->
    
    <!-- Signup Modal -->
    <div id="signup-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto relative">
            <button onclick="App.closeModal('signup-modal')" class="absolute top-4 right-4 text-muted hover:text-fg text-2xl">&times;</button>
            <div class="p-8">
                <div class="mb-8">
                    <h2 class="font-display text-2xl font-bold">Create Account</h2>
                    <p class="text-muted text-sm mt-1">Join as <span id="signup-type-label" class="text-accent font-medium">Client</span></p>
                </div>
                <div class="flex gap-2 mb-8">
                    <div class="h-1 flex-1 rounded-full bg-accent" id="prog-1"></div>
                    <div class="h-1 flex-1 rounded-full bg-border" id="prog-2"></div>
                </div>

                <form id="signup-form" onsubmit="Auth.handleSignup(event)">
                    <div id="step-1" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-muted block mb-1">Full Name</label>
                                <input type="text" id="s-name" class="input-field" placeholder="Legal Name" required>

                            <div>

                            <input type="email" id="s-email" class="input-field" placeholder="email@example.com" required>

                            <label class="text-xs text-muted block mb-1">Password</label>
                            <input type="password" id="s-pass" class="input-field" placeholder="Min 6 characters" required>
                        </div>
                        <button type="button" onclick="App.step(2)" class="btn-primary w-full mt-4">Continue to KYC</button>
                    </div>

                    <div id="step-2" class="space-y-4 hidden">
                        <div class="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3 text-sm text-amber-200 mb-4">
                            <strong>Secure Verification:</strong> Documents are encrypted.
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">Aadhaar Number</label>
                            <input type="text" id="s-aadhaar" class="input-field" placeholder="12 digit number" required pattern="^[2-9]{1}[0-9]{3}[0-9]{4}[0-9]{4}$">
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">Aadhaar Card Scan</label>
                            <input type="file" id="s-aadhaar-file" accept="image/*,.pdf" class="input-field text-sm" required>
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">PAN Number</label>
                            <input type="text" id="s-pan" class="input-field" placeholder="ABCDE1234F" required pattern="^[A-Z]{5}[0-9]{4}[A-Z]{1}$">
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">PAN Card Scan</label>
                            <input type="file" id="s-pan-file" accept="image/*,.pdf" class="input-field text-sm" required>
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">Driving License Number</label>
                            <input type="text" id="s-dl" class="input-field" required>
                        </div>
                        <div>
                            <label class="text-xs text-muted block mb-1">DL Scan</label>
                            <input type="file" id="s-dl-file" accept="image/*,.pdf" class="input-field text-sm" required>
                        </div>
                        <div class="flex gap-4 mt-4">
                            <button type="button" onclick="App.step(1)" class="btn-ghost flex-1">Back</button>
                            <button type="submit" id="signup-btn" class="btn-primary flex-1">Create Account</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-card border border-border rounded-lg px-5 py-3 shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-[200]">
        <span id="toast-msg">Message</span>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const CONFIG = {
            SUPABASE_URL: 'https://flxjlkxfydsrruszrldy.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZseGpsa3hmeWRzcnJ1c3pybGR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5Mzc0OTYsImV4cCI6MjA4NzUxMzQ5Nn0.vLkSmPjIo79JmzsgMZD89R0GaGzZQMlcp2n6tKU4tP4',
            ACTIVE_CITY: 'Chennai',
            PHONE: '+91 96053 70108',
            WHATSAPP: 'https://wa.me/919605370108?text=Hi%20Cruzio'
        };

        const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // ================= APP STATE =================
        const App = {
            user: null,
            profile: null,
            
            init: async () => {
                await Auth.checkSession();
                Router.init();
                App.loadTheme(); 
            },

            toggleMenu: () => document.getElementById('dropdown').classList.toggle('hidden'),
            openModal: (id) => document.getElementById(id).classList.remove('hidden'),
            closeModal: (id) => document.getElementById(id).classList.add('hidden'),
            
            toast: (msg, type = 'success') => {
                const t = document.getElementById('toast');
                const m = document.getElementById('toast-msg');
                m.textContent = msg;
                t.style.borderColor = type === 'error' ? '#ef4444' : 'var(--accent)';
                t.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
            },

            loadTheme: () => {
                const savedTheme = localStorage.getItem('theme');
                const btn = document.getElementById('theme-toggle-btn');
                if (savedTheme === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    btn.innerHTML = `<svg class="w-5 h-5 text-fg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`;
                } else {
                    btn.innerHTML = `<svg class="w-5 h-5 text-fg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`;
                }
            },

            toggleTheme: () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                if (isLight) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
                App.loadTheme();
            },

            step: (n) => {
                document.getElementById('step-1').classList.toggle('hidden', n !== 1);
                document.getElementById('step-2').classList.toggle('hidden', n !== 2);
                document.getElementById('prog-1').style.background = n >= 1 ? 'var(--accent)' : 'var(--border)';
                document.getElementById('prog-2').style.background = n >= 2 ? 'var(--accent)' : 'var(--border)';
            },

            setRole: (role) => {
                document.getElementById('signup-type-label').innerText = role.charAt(0).toUpperCase() + role.slice(1);
            },

            openListVehicle: () => {
                if(!App.user) {
                    App.openModal('signup-modal');
                    App.setRole('partner');
                } else if (App.profile.role === 'client') {
                    App.toast("Sign up as Partner to list vehicles.", "error");
                } else {
                    Router.navigate('partner_dashboard');
                }
            },

            updateUI: () => {
                const authBtns = document.getElementById('auth-buttons');
                const userMenu = document.getElementById('user-menu');
                if(App.user) {
                    authBtns.classList.add('hidden');
                    userMenu.classList.remove('hidden');
                    document.getElementById('user-name').textContent = App.profile?.full_name || 'User';
                    document.getElementById('user-avatar').textContent = App.profile?.full_name?.charAt(0) || 'U';
                    document.getElementById('user-role-label').textContent = App.profile?.role || 'Client';
                } else {
                    authBtns.classList.remove('hidden');
                    userMenu.classList.add('hidden');
                }
            }
        };

        // ================= AUTH =================
        const Auth = {
            checkSession: async () => {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    App.user = session.user;
                    await Auth.fetchProfile();
                }
                App.updateUI();
            },

            fetchProfile: async () => {
                const { data } = await sb.from('profiles').select('*').eq('id', App.user.id).single();
                App.profile = data;
            },

            mapError: (msg) => {
                if(msg.includes("User already registered")) return "An account with this email already exists.";
                if(msg.includes("Invalid login credentials")) return "Incorrect email or password.";
                if(msg.includes("Email not confirmed")) return "Please verify your email first.";
                return msg;
            },

            handleLogin: async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if (error) return App.toast(Auth.mapError(error.message), 'error');
                App.user = data.user;
                await Auth.fetchProfile();
                App.updateUI();
                if (App.profile.role === 'admin') Router.navigate('admin_dashboard');
                else if (App.profile.role === 'partner') Router.navigate('partner_dashboard');
                else Router.navigate('dashboard');
                App.toast('Welcome back!');
            },

            handleSignup: async (e) => {
                e.preventDefault();
                const btn = document.getElementById('signup-btn');
                btn.innerHTML = "<span class='animate-pulse'>Creating...</span>";
                btn.disabled = true;
                const role = document.getElementById('signup-type-label').innerText.toLowerCase();
                const email = document.getElementById('s-email').value;
                const pass = document.getElementById('s-pass').value;
                const name = document.getElementById('s-name').value;
                const phone = document.getElementById('s-phone').value;
                const aadhaar = document.getElementById('s-aadhaar').value;
                const pan = document.getElementById('s-pan').value;
                const dl = document.getElementById('s-dl').value;

                try {
                    const { data, error } = await sb.auth.signUp({
                        email, password: pass,
                        options: { data: { full_name: name, phone, role } }
                    });
                    if (error) throw error;
                    
                    // If email confirmation is ON (Brevo)
                    if (data.user && !data.session) {
                        App.closeModal('signup-modal');
                        App.toast('Verification email sent! Please check your inbox.', 'success');
                        Router.navigate('login');
                        return;
                    }

                    // Upload Docs
                    const userId = data.user.id;
                    const uploadFile = async (inputId, folder) => {
                        const file = document.getElementById(inputId).files[0];
                        if(!file) return null;
                        const path = `${userId}/${folder}_${Date.now()}`;
                        await sb.storage.from('kyc_documents').upload(path, file);
                        return sb.storage.from('kyc_documents').getPublicUrl(path).data.publicUrl;
                    };
                    const [aadhaarUrl, panUrl, dlUrl] = await Promise.all([
                        uploadFile('s-aadhaar-file', 'aadhaar'), uploadFile('s-pan-file', 'pan'), uploadFile('s-dl-file', 'dl')
                    ]);
                    await sb.from('profiles').update({
                        aadhaar_number: aadhaar, pan_number: pan, dl_number: dl,
                        aadhaar_url: aadhaarUrl, pan_url: panUrl, dl_url: dlUrl, kyc_status: 'submitted'
                    }).eq('id', userId);

                    await Auth.fetchProfile();
                    App.closeModal('signup-modal');
                    App.updateUI();
                    Router.navigate('dashboard');
                    App.toast('Account created! KYC under review.');
                } catch (err) {
                    App.toast(Auth.mapError(err.message), 'error');
                    btn.innerHTML = "Create Account";
                    btn.disabled = false;
                }
            },

            logout: async () => {
                await sb.auth.signOut();
                App.user = null; App.profile = null;
                App.updateUI();
                Router.navigate('home');
                App.toast('Logged out');
            }
        };

        // ================= ROUTER =================
        const Router = {
            init: () => {
                window.onhashchange = () => Router.loadRoute();
                Router.loadRoute();
            },
            navigate: (view) => { window.location.hash = view; },
            loadRoute: async () => {
                const view = window.location.hash.slice(1) || 'home';
                const main = document.getElementById('main-view');
                const topNav = document.getElementById('top-nav');
                
                const protectedRoutes = ['dashboard', 'partner_dashboard', 'admin_dashboard'];
                if (protectedRoutes.includes(view) && !App.user) return Router.navigate('login');

                if (view === 'admin_dashboard' && App.profile?.role !== 'admin') return Router.navigate('home');
                if (view === 'partner_dashboard' && !['partner', 'admin'].includes(App.profile?.role)) return Router.navigate('home');

                topNav.classList.toggle('hidden', (view.includes('dashboard')));
                
                switch(view) {
                    case 'login': main.innerHTML = Views.login(); break;
                    case 'dashboard': main.innerHTML = Views.clientDashboard(); break;
                    case 'partner_dashboard': main.innerHTML = Views.partnerDashboard(); PartnerCtrl.init(); break;
                    case 'admin_dashboard': main.innerHTML = Views.adminDashboard(); AdminCtrl.init(); break;
                    case 'cars': main.innerHTML = Views.carsList(); CarCtrl.loadCars(); break;
                    default: main.innerHTML = Views.home();
                }
            }
        };

        // ================= VIEWS =================
        const Views = {
            home: () => `
                <div class="min-h-screen relative overflow-hidden">
                    <div class="absolute inset-0 pointer-events-none">
                        <div class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-amber-500/20 rounded-full blur-[120px]"></div>
                    </div>
                    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 pt-20 flex flex-col lg:flex-row items-center gap-12">
                        <div class="flex-1 text-center lg:text-left">
                            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface border border-border mb-6 fade-in">
                                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                <span class="text-sm text-muted">Currently serving Chennai</span>
                            </div>
                            <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-bold leading-tight mb-6 fade-in">
                                Premium Rentals <br><span class="text-accent">At Your Fingertips</span>
                            </h1>
                            <p class="text-lg text-muted mb-8 max-w-lg mx-auto lg:mx-0 fade-in">
                                Premium car rentals for every occasion. Verified vehicles by Shine Ventures.
                            </p>
                            <div class="flex gap-4 justify-center lg:justify-start fade-in flex-wrap">
                                <button onclick="Router.navigate('cars')" class="btn-primary">View Cars</button>
                                <a href="${CONFIG.WHATSAPP}" target="_blank" class="btn-ghost">Best Offers</a>
                            </div>
                        </div>
                        <div class="flex-1 relative fade-in hidden lg:block">
                            <img src="https://images.unsplash.com/photo-1617531653332-bd46c24f2068?auto=format&fit=crop&w=800&q=80" class="rounded-3xl shadow-2xl border border-border w-full h-auto" alt="Premium Car">
                        </div>
                    </div>
                    <footer class="absolute bottom-0 left-0 right-0 py-6 border-t border-border bg-bg/50 backdrop-blur-sm mt-20">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <p class="text-sm text-muted">© 2024 Cruzio.in. A product of <strong class="text-fg">Shine Ventures</strong>.</p>
                                <div class="text-sm text-accent font-medium mt-1">Bookings: ${CONFIG.PHONE}</div>
                            </div>
                            <div class="flex gap-6 text-sm text-muted">
                                <a href="#" class="hover:text-accent">Terms</a>
                                <a href="#" class="hover:text-accent">Privacy</a>
                            </div>
                        </div>
                    </footer>
                </div>
            `,

            login: () => `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-card border border-border rounded-2xl p-8">
                        <h2 class="font-display text-2xl font-bold mb-6">Login</h2>
                        <form onsubmit="Auth.handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="text-xs text-muted block mb-1">Email</label>
                                <input type="email" id="login-email" class="input-field" placeholder="email@example.com" required>
                            </div>
                            <div>
                                <label class="text-xs text-muted block mb-1">Password</label>
                                <input type="password" id="login-pass" class="input-field" placeholder="Enter password" required>
                            </div>
                            <button type="submit" class="btn-primary w-full">Login</button>
                        </form>
                        <p class="mt-4 text-center text-sm text-muted">
                            Don't have an account? <a href="#" onclick="App.openModal('signup-modal'); App.setRole('client')" class="text-accent hover:underline">Sign Up</a>
                        </p>
                    </div>
                </div>
            `,

            clientDashboard: () => `
                <div class="flex bg-surface min-h-screen">
                    ${Views.sidebar('client')}
                    <div class="main-dashboard p-4 md:p-8 w-full">
                        <h1 class="font-display text-2xl font-bold mb-6">My Dashboard</h1>
                        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                            <div class="bg-card border border-border rounded-xl p-5">
                                <div class="text-xs text-muted mb-1">KYC Status</div>
                                <div class="text-lg font-bold capitalize ${App.profile?.kyc_status === 'approved' ? 'text-green-500' : 'text-amber-500'}">${App.profile?.kyc_status}</div>
                            </div>
                        </div>
                         <div class="bg-card border border-border rounded-xl p-6">
                            <h3 class="font-bold mb-4">Need Help?</h3>
                            <a href="${CONFIG.WHATSAPP}" target="_blank" class="btn-primary text-sm py-2 inline-block">Contact Support</a>
                        </div>
                    </div>
                </div>
            `,

            partnerDashboard: () => `
                <div class="flex bg-surface min-h-screen">
                    ${Views.sidebar('partner')}
                    <div class="main-dashboard p-4 md:p-8 w-full">
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="font-display text-2xl font-bold">Partner Portal</h1>
                            <button onclick="PartnerCtrl.addCar()" class="btn-primary text-sm py-2">+ Add Car</button>
                        </div>
                        <div class="bg-card border border-border rounded-xl overflow-x-auto">
                            <table class="w-full min-w-[400px]">
                                <thead class="border-b border-border">
                                    <tr><th class="text-left p-4 text-xs text-muted font-medium">CAR NAME</th><th class="text-left p-4 text-xs text-muted font-medium">STATUS</th><th class="text-left p-4 text-xs text-muted font-medium">PRICE</th></tr>
                                </thead>
                                <tbody id="partner-cars-tbody"><tr><td colspan="3" class="p-8 text-center text-muted">Loading...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `,

            adminDashboard: () => `
                <div class="flex bg-surface min-h-screen">
                    ${Views.sidebar('admin')}
                    <div class="main-dashboard p-4 md:p-8 w-full">
                        <h1 class="font-display text-2xl font-bold mb-6">Super Admin</h1>
                        <div class="flex gap-1 mb-6 bg-card p-1 rounded-lg inline-flex">
                            <button onclick="AdminCtrl.tab('users')" id="tab-users" class="px-4 py-2 text-sm rounded-md bg-accent text-black font-medium">Users</button>
                            <button onclick="AdminCtrl.tab('cars')" id="tab-cars" class="px-4 py-2 text-sm rounded-md text-muted hover:bg-surface">Cars</button>
                        </div>
                        <div id="admin-content" class="bg-card border border-border rounded-xl overflow-hidden"></div>
                    </div>
                </div>
            `,

            sidebar: (role) => `
                <div class="sidebar" id="sidebar-panel">
                    <div class="mb-10 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <!-- Updated: Local Logo in Sidebar -->
                            <img src="./Cruzio logo.png" class="w-8 h-8 rounded object-contain">
                            <span class="font-display font-bold">Cruzio</span>
                        </div>
                        <!-- Close button for mobile -->
                        <button onclick="document.getElementById('sidebar-panel').classList.remove('open')" class="md:hidden text-muted">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <nav class="flex-1 space-y-1">
                        <a href="#" onclick="Router.navigate('home')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-muted hover:text-fg hover:bg-surface transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            <span class="text-sm">Public Site</span>
                        </a>
                    </nav>
                    <div class="border-t border-border pt-4">
                         <button onclick="Auth.logout()" class="w-full text-left text-sm text-red-400 hover:bg-red-500/10 px-3 py-2 rounded-lg">Logout</button>
                    </div>
                </div>
                <!-- Mobile Menu Overlay Toggle -->
                <div class="fixed top-4 left-4 z-50 md:hidden">
                     <button onclick="document.getElementById('sidebar-panel').classList.toggle('open')" class="p-2 bg-surface rounded-lg border border-border">
                         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                     </button>
                </div>
            `,

            carsList: () => `
                <div class="p-4 md:p-8 max-w-7xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div>
                            <h1 class="font-display text-2xl font-bold">Browse Cars</h1>
                            <p class="text-sm text-muted">Available in Chennai</p>
                        </div>
                        <a href="${CONFIG.WHATSAPP}" target="_blank" class="btn-ghost text-sm flex items-center gap-2">
                            Exclusive Offers? Chat Now
                        </a>
                    </div>
                    <div id="cars-container">
                        <div class="text-center py-20 text-muted">Loading cars...</div>
                    </div>
                </div>
            `
        };

        // ================= CONTROLLERS =================
        const CarCtrl = {
            loadCars: async () => {
                const container = document.getElementById('cars-container');
                const { data, error } = await sb.from('cars').select('*').order('created_at', { ascending: false });
                
                if(error || !data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 text-muted border border-dashed border-border rounded-xl">
                            <p>No cars found.</p>
                            <p class="text-xs mt-2">Please check if you have run the SQL setup script.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${data.map(car => `
                        <div class="bg-card border border-border rounded-xl overflow-hidden hover:border-accent transition-colors relative">
                            ${!car.is_approved ? `<div class="absolute top-3 left-3 z-10 bg-red-500/90 text-white text-xs font-bold px-3 py-1 rounded-full">Not Available</div>` : ''}
                            <img src="${car.image_url || 'https://via.placeholder.com/400'}" class="w-full h-48 object-cover" alt="${car.name}">
                            <div class="p-4">
                                <h3 class="font-bold">${car.name}</h3>
                                <p class="text-sm text-muted mb-3">${car.category || 'Vehicle'}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-accent font-bold">₹${car.price}<span class="text-xs text-muted font-normal">/day</span></span>
                                    ${car.is_approved 
                                        ? `<a href="${CONFIG.WHATSAPP}%20-%20${encodeURIComponent(car.name)}" target="_blank" class="btn-primary text-xs py-2 px-4">Book</a>`
                                        : `<button disabled class="btn-ghost text-xs py-2 px-4 opacity-50">Unavailable</button>`
                                    }
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
        };

        const PartnerCtrl = {
            init: async () => {
                const { data } = await sb.from('cars').select('*').eq('owner_id', App.user.id);
                const tbody = document.getElementById('partner-cars-tbody');
                if(data && data.length > 0) {
                    tbody.innerHTML = data.map(c => `
                        <tr class="border-b border-border hover:bg-surface/50">
                            <td class="p-4">${c.name}</td>
                            <td class="p-4"><span class="px-2 py-1 rounded text-xs ${c.is_approved ? 'bg-green-500/20 text-green-500' : 'bg-amber-500/20 text-amber-500'}">${c.is_approved ? 'Live' : 'Pending'}</span></td>
                            <td class="p-4">₹${c.price}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-muted">No cars listed.</td></tr>';
                }
            },
            addCar: async () => {
                const name = prompt("Car Name:");
                if(!name) return;
                const price = prompt("Price:");
                if(!price) return;
                await sb.from('cars').insert([{ owner_id: App.user.id, name, price, category: 'sedan' }]);
                App.toast("Car submitted for approval");
                PartnerCtrl.init();
            }
        };

        const AdminCtrl = {
            init: () => AdminCtrl.tab('users'),
            
            tab: async (t) => {
                document.querySelectorAll('[id^="tab-"]').forEach(b => {
                    b.classList.remove('bg-accent', 'text-black');
                    b.classList.add('text-muted');
                });
                document.getElementById(`tab-${t}`).classList.add('bg-accent', 'text-black');
                document.getElementById(`tab-${t}`).classList.remove('text-muted');
                
                const container = document.getElementById('admin-content');
                container.innerHTML = '<div class="p-8 text-center text-muted">Loading...</div>';

                if(t === 'users') {
                    const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
                    container.innerHTML = `
                        <div class="overflow-x-auto">
                        <table class="w-full min-w-[500px]">
                            <thead class="border-b border-border"><tr><th class="text-left p-4 text-xs text-muted">USER</th><th class="text-left p-4 text-xs text-muted">ROLE</th><th class="text-left p-4 text-xs text-muted">KYC</th><th class="text-left p-4 text-xs text-muted">ACTION</th></tr></thead>
                            <tbody>
                                ${data.map(u => `
                                    <tr class="border-b border-border hover:bg-surface/50">
                                        <td class="p-4"><div class="font-medium">${u.full_name}</div><div class="text-xs text-muted">${u.phone}</div></td>
                                        <td class="p-4 capitalize">${u.role}</td>
                                        <td class="p-4"><span class="px-2 py-1 rounded text-xs ${u.kyc_status === 'approved' ? 'bg-green-500/20 text-green-500' : 'bg-amber-500/20 text-amber-500'}">${u.kyc_status}</span></td>
                                        <td class="p-4">
                                            ${u.kyc_status === 'submitted' ? `<button onclick="AdminCtrl.approve('${u.id}')" class="text-xs bg-green-500/20 text-green-500 px-3 py-1 rounded">Approve</button>` : ''}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        </div>
                    `;
                }

                if(t === 'cars') {
                    const { data } = await sb.from('cars').select('*, profiles(full_name)').order('created_at', { ascending: false });
                    container.innerHTML = `
                        <div class="overflow-x-auto">
                        <table class="w-full min-w-[500px]">
                             <thead class="border-b border-border"><tr><th class="text-left p-4 text-xs text-muted">CAR</th><th class="text-left p-4 text-xs text-muted">OWNER</th><th class="text-left p-4 text-xs text-muted">STATUS</th></tr></thead>
                             <tbody>
                                ${data.map(c => `
                                    <tr class="border-b border-border hover:bg-surface/50">
                                        <td class="p-4">${c.name}</td>
                                        <td class="p-4">${c.profiles?.full_name || 'Fleet'}</td>
                                        <td class="p-4">
                                            <div class="flex items-center gap-2">
                                                <span class="text-xs text-muted">${c.is_approved ? 'Live' : 'Pending'}</span>
                                                <div onclick="AdminCtrl.toggleCar('${c.id}', ${!c.is_approved})" class="toggle-switch ${c.is_approved ? 'active' : ''}"></div>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                             </tbody>
                        </table>
                        </div>
                    `;
                }
            },

            approve: async (id) => {
                await sb.from('profiles').update({ kyc_status: 'approved' }).eq('id', id);
                AdminCtrl.tab('users');
                App.toast('KYC Approved');
            },

            toggleCar: async (id, status) => {
                await sb.from('cars').update({ is_approved: status }).eq('id', id);
                AdminCtrl.tab('cars');
                App.toast(status ? 'Car Approved' : 'Car Unlisted');
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
